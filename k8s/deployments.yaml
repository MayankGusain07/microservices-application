######################################################
# k8s/deployments.yaml
# Kubernetes manifests for all 3 microservices
# Replace YOUR_ACCOUNT_ID and YOUR_REGION before applying
######################################################

# ===== USER SERVICE =====
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  labels:
    app: user-service
spec:
  replicas: 2                  # 2 copies = high availability
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          # Replace with your actual ECR URL from terraform output
          image: 785703563293.dkr.ecr.us-east-1.amazonaws.com/ecommerce-app/user-service:latest
          ports:
            - containerPort: 3001
          # Kubernetes checks this to know if the pod is healthy
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
spec:
  selector:
    app: user-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3001

